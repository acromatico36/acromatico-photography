<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Acromatico Education</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    
    .signup-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .logo {
      width: 180px;
      height: auto;
      margin: 0 auto 32px;
      display: block;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 300;
      text-align: center;
      margin-bottom: 8px;
      color: #fff;
    }
    
    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 32px;
      font-size: 14px;
    }
    
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .role-btn {
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .role-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(71, 148, 166, 0.5);
    }
    
    .role-btn.active {
      background: rgba(71, 148, 166, 0.15);
      border-color: #4794A6;
    }
    
    .role-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .role-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .role-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }
    
    input, select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #4794A6;
      background: rgba(255, 255, 255, 0.12);
    }
    
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    select {
      cursor: pointer;
    }
    
    select option {
      background: #1a1a1a;
      color: #fff;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: #4794A6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: #5aa5b8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(71, 148, 166, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .link a {
      color: #4794A6;
      text-decoration: none;
      font-weight: 600;
    }
    
    .link a:hover {
      color: #5aa5b8;
      text-decoration: underline;
    }
    
    .back-link {
      text-align: center;
      margin-top: 32px;
    }
    
    .back-link a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }
    
    .back-link a:hover {
      color: #4794A6;
    }
    
    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    @media (max-width: 480px) {
      .signup-container {
        padding: 32px 24px;
      }
      
      h1 {
        font-size: 28px;
      }
      
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <img src="/static/acromatico-logo-dark.png" alt="Acromatico" class="logo">
    <h1>Join Acromatico</h1>
    <p class="subtitle">Start your creative mastery journey today</p>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <div class="role-selector">
      <div class="role-btn active" data-role="student">
        <div class="role-icon">🎓</div>
        <div class="role-title">Student</div>
        <div class="role-desc">Ages 7-14</div>
      </div>
      <div class="role-btn" data-role="parent">
        <div class="role-icon">👨‍👩‍👧‍👦</div>
        <div class="role-title">Parent</div>
        <div class="role-desc">For families</div>
      </div>
    </div>
    
    <form id="signupForm">
      <input type="hidden" id="role" name="role" value="student">
      
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" required>
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
      </div>
      
      <div class="form-group" id="ageGroup" style="display: block;">
        <label for="age">Age Range</label>
        <select id="age" name="age" required>
          <option value="">Select age range</option>
          <option value="7-9">7-9 years (Foundation)</option>
          <option value="10-12">10-12 years (Mastery)</option>
          <option value="13-14">13-14 years (Pro)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn">Create Account</button>
    </form>
    
    <div class="link">
      Already have an account? <a href="/education/login">Sign in</a>
    </div>
    
    <div class="back-link">
      <a href="/education">← Back to Education</a>
    </div>
  </div>
  
  <script>
    // Role selector
    const roleBtns = document.querySelectorAll('.role-btn');
    const roleInput = document.getElementById('role');
    const ageGroup = document.getElementById('ageGroup');
    
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const role = btn.dataset.role;
        roleInput.value = role;
        
        // Show/hide age selector based on role
        if (role === 'student') {
          ageGroup.style.display = 'block';
          document.getElementById('age').required = true;
        } else {
          ageGroup.style.display = 'none';
          document.getElementById('age').required = false;
        }
      });
    });
    
    // Form submission
    const form = document.getElementById('signupForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match!';
        errorMessage.style.display = 'block';
        return;
      }
      
      const formData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: password,
        role: roleInput.value,
        age: document.getElementById('age').value || null
      };
      
      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successMessage.textContent = 'Account created successfully! Redirecting to login...';
          successMessage.style.display = 'block';
          
          setTimeout(() => {
            window.location.href = '/education/login';
          }, 2000);
        } else {
          errorMessage.textContent = data.message || 'Signup failed. Please try again.';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'Network error. Please check your connection.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
