<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Acromatico Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-primary {
      background: #4794A6;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #5aa5b8;
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen flex items-center justify-center p-6">
  
  <div class="glass rounded-2xl p-8 max-w-md w-full">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-light mb-2">Reset Password</h1>
      <p class="text-gray-400 text-sm">Enter your email to receive a reset link</p>
    </div>

    <div id="successMessage" class="hidden mb-6 p-4 bg-green-500/20 border border-green-500/50 rounded-lg text-green-400 text-sm">
      ✅ Password reset email sent! Check your inbox.
    </div>

    <div id="errorMessage" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm">
      ❌ <span id="errorText">Something went wrong. Please try again.</span>
    </div>

    <form id="resetForm" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold mb-2">Email Address</label>
        <input 
          type="email" 
          id="email" 
          required 
          class="w-full px-4 py-3 glass rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          placeholder="your@email.com"
        >
      </div>

      <button type="submit" class="w-full btn-primary py-3 rounded-lg font-semibold">
        Send Reset Link
      </button>
    </form>

    <div class="mt-6 text-center space-y-3 text-sm">
      <a href="/education/login" class="block text-teal-400 hover:text-teal-300">
        ← Back to Login
      </a>
      <a href="/education/signup" class="block text-gray-400 hover:text-gray-300">
        Don't have an account? Sign up
      </a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const successMsg = document.getElementById('successMessage');
      const errorMsg = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // Hide messages
      successMsg.classList.add('hidden');
      errorMsg.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.message || 'Failed to send reset email');
        }

        // Show success
        successMsg.classList.remove('hidden');
        document.getElementById('resetForm').reset();

        // Redirect after 3 seconds
        setTimeout(() => {
          window.location.href = '/education/login';
        }, 3000);

      } catch (error) {
        console.error('Reset password error:', error);
        errorText.textContent = error.message;
        errorMsg.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
