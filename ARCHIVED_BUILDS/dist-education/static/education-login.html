<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Acromatico Education</title>
  <link rel="stylesheet" href="/static/acromatico-brand.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      padding: 48px;
      width: 100%;
      max-width: 440px;
    }
    
    .logo {
      margin: 0 auto 32px;
      filter: brightness(1.1);
    }
    
    h1 {
      font-size: 32px;
      font-weight: 200;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    
    .subtitle {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 400;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: #5aa5b8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(71, 148, 166, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .divider {
      text-align: center;
      margin: 24px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .link a {
      color: #4794A6;
      text-decoration: none;
      font-weight: 600;
    }
    
    .link a:hover {
      color: #5aa5b8;
      text-decoration: underline;
    }
    
    .back-link {
      text-align: center;
      margin-top: 32px;
    }
    
    .back-link a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }
    
    .back-link a:hover {
      color: #4794A6;
    }
    
    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }
      
      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container glass-container">
    <img src="/static/acromatico-logo-white.png" alt="Acromatico" class="logo">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue your creative journey</p>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn">Sign In</button>
    </form>
    
    <div class="divider">or</div>
    
    <div class="link">
      Don't have an account? <a href="/education/signup">Create account</a>
    </div>
    
    <div class="link">
      <a href="/education/reset-password">Forgot password?</a>
    </div>
    
    <div class="back-link">
      <a href="/education">← Back to Education</a>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
      
      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Store token and user info (use 'auth_token' for consistency)
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          successMessage.textContent = 'Login successful! Redirecting...';
          successMessage.style.display = 'block';
          
          // Redirect based on role
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = '/admin/curriculum';
            } else if (data.user.role === 'parent') {
              window.location.href = '/parent/dashboard';
            } else if (data.user.role === 'student') {
              window.location.href = '/student/dashboard';
            } else {
              // Default fallback for any other roles
              window.location.href = '/education';
            }
          }, 1000);
        } else {
          errorMessage.textContent = data.message || 'Login failed. Please try again.';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'Network error. Please check your connection.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
