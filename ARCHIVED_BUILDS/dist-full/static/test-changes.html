<!DOCTYPE html>
<html>
<head>
<style>
.cta-button {
    display: inline-block;
    padding: 12px 24px;
    background: #ffffff;
    color: #1a1a1a;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    border: 2px solid #ffffff;
}

.cta-section {
    background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
    padding: 60px 40px;
    text-align: center;
    border-radius: 12px;
    margin: 60px auto;
    color: #ffffff;
    max-width: 1200px;
}

.related-posts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1200px;
    margin: 40px auto;
}

.related-post {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    background: #f5f5f5;
    text-align: center;
}

.related-post img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    background: #ddd;
}

.related-post h3 {
    padding: 20px;
}
</style>
</head>
<body style="padding: 40px; background: #f9f9f9;">

<div class="cta-section">
    <h3>Planning Your Pennsylvania Wedding?</h3>
    <p>Let's create stunning photos that tell your unique love story.</p>
    <a href="#" class="cta-button">View Packages & Pricing</a>
</div>

<h2 style="text-align: center; margin-top: 60px;">More Pennsylvania Wedding Photography</h2>
<div class="related-posts-grid">
    <div class="related-post">
        <img src="https://via.placeholder.com/400x350/667eea/ffffff?text=Post+1" alt="Post 1">
        <h3>Sarah & Mike | Rustic Barn Wedding</h3>
    </div>
    <div class="related-post">
        <img src="https://via.placeholder.com/400x350/764ba2/ffffff?text=Post+2" alt="Post 2">
        <h3>Emma & James | Lancaster Estate</h3>
    </div>
    <div class="related-post">
        <img src="https://via.placeholder.com/400x350/667eea/ffffff?text=Post+3" alt="Post 3">
        <h3>Kate & Alex | Philadelphia Venue</h3>
    </div>
</div>

</body>
</html>
